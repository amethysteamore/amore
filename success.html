<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Unlocked Amor-e Card!</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --amor-dark-red: #900c22;
      --amor-bright-red: #c72c48;
      --amor-light-pink: #fff5f6;
      --amor-bg-pink: #fef8f9;
    }
    body { font-family: 'Poppins', sans-serif; background-color: var(--amor-bg-pink); }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    
    .e-card-preview {
      background-color: var(--amor-light-pink); 
      border-radius: 20px;
      border: 1px solid #ffe3e7;
      padding: 50px 40px;
      box-shadow: 0 15px 40px rgba(228, 130, 146, 0.15);
      width: 100%;
      max-width: 600px;
      position: relative; 
      overflow: hidden; 
      z-index: 1; 
      display: inline-block; 
    }
    .card-brand-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--amor-dark-red);
      letter-spacing: 4px;
      margin-bottom: 20px;
      border-bottom: 1px double #ffd0d6;
      padding-bottom: 5px;
    }
    .card-background-pattern {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('heart.png'); background-size: 90px 90px; background-repeat: repeat;   
      opacity: 0.04; z-index: 0; pointer-events: none;
    }
    .corner-floral { position: absolute; width: 110px; height: 110px; background-size: contain; background-repeat: no-repeat; z-index: -1; opacity: 0.9; }
    .floral-top-left { top: -5px; left: -5px; background-image: url('flower.png'); }
    .floral-bottom-right { bottom: 0; right: 0; background-image: url('flower.png'); transform: rotate(180deg); }
    .floral-bottom-left { bottom: 0; left: 0; background-image: url('heart.png'); transform: rotate(45deg); }
    .floral-top-right { top: -5px; right: -5px; background-image: url('heart.png'); transform: rotate(225deg); }

    .card-content-wrapper { position: relative; z-index: 2; }
    .card-text-main { font-size: 1.35rem; line-height: 1.6; margin-bottom: 20px; }
    .acrostic-container { font-family: 'Dancing Script', cursive; font-size: 2.7rem; color: var(--amor-bright-red); line-height: 1.35; margin: 25px 0; }
    .acrostic-letter { font-size: 3.3rem; font-weight: 700; color: var(--amor-dark-red); }
    .romantic-quote { font-size: 1.25rem; margin-top: 25px; border-top: 1px solid #ffd0d6; padding-top: 20px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

  <div class="container py-5 text-center">
    <span class="fs-4">🎉</span>
    <h1 class="text-success fw-bold mb-2">Payment Successful!</h1>
    <p class="text-muted mb-4">Your premium watermark-free greeting card is ready.</p>

    <!-- The Clean, Unwatermarked Card Canvas -->
    <div class="d-flex justify-content-center mb-4">
      <div id="captureTarget" class="e-card-preview text-center">
        <div class="corner-floral floral-top-left"></div>
        <div class="corner-floral floral-bottom-right"></div>
        <div class="corner-floral floral-bottom-left"></div>
        <div class="corner-floral floral-top-right"></div>
        <div class="card-background-pattern"></div>
        
        <!-- Notice there is NO watermark div here! -->
        <div class="card-content-wrapper">
          <div class="card-brand-header">AMORE</div>
          <div class="card-text-main">To my wonderful <span id="partnerNameSpan" class="fw-bold"></span>. You are truly</div>
          <div id="acrosticMessage" class="acrostic-container"></div>
          <div id="romanticQuote" class="romantic-quote"></div>
        </div>
      </div>
    </div>

    <!-- Active Premium Share Tools -->
    <div class="d-flex flex-wrap justify-content-center gap-3">
      <button id="shareBtn" class="btn btn-danger btn-lg px-4 fw-medium" style="background-color: var(--amor-dark-red); border: none;">
        💝 Share Image directly to WhatsApp/Insta
      </button>
      <button id="downloadBtn" class="btn btn-outline-secondary btn-lg px-4 fw-medium">
        💾 Save HD Image File
      </button>
    </div>
    <a href="index.html" class="d-block mt-4 text-secondary small">Create another greeting card</a>
  </div>

  <script>
    const acrosticData = {
      'A': 'Adorable', 'B': 'Brilliant', 'C': 'Charming', 'D': 'Darling', 'E': 'Enchanting',
      'F': 'Fantastic', 'G': 'Gorgeous', 'H': 'Heavenly', 'I': 'Incredible', 'J': 'Joyful',
      'K': 'Kindhearted', 'L': 'Lovely', 'M': 'Magnetic', 'N': 'Nice', 'O': 'Outstanding',
      'P': 'Perfect', 'Q': 'Queen', 'R': 'Radiant', 'S': 'Special', 'T': 'Trustworthy',
      'U': 'Unique', 'V': 'Vibrant', 'W': 'Wonderful', 'X': 'Xtraordinary', 'Y': 'Youthful', 'Z': 'Zealous'
    };

    const romanticQuotes = [
      "You are the one I fell in love with, and the one I would fall for again and again.",
      "You make my world complete, and I am incredibly lucky to have you in my life.",
      "My love for you is a beautiful journey that starts at forever and ends at never.",
      "You make every single day feel like a fairytale. I love you more than words can say.",
      "Being in your arms is my absolute favorite place to be. You are my everything."
    ];

    // Magic Step: Parse the URL query string to retrieve the partner's name
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name') || "My Love";
    const loverName = rawName.charAt(0).toUpperCase() + rawName.slice(1).toLowerCase();

    // Rebuild layout text fields
    let acrosticHtml = '';
    const upperName = loverName.toUpperCase();
    for (let i = 0; i < upperName.length; i++) {
      const letter = upperName[i];
      if (acrosticData[letter]) {
        acrosticHtml += `<div><span class="acrostic-letter">${letter}</span>${acrosticData[letter].slice(1).toLowerCase()}</div>`;
      }
    }
    const randomQuote = romanticQuotes[Math.floor(Math.random() * romanticQuotes.length)];

    document.getElementById('partnerNameSpan').innerText = loverName;
    document.getElementById('acrosticMessage').innerHTML = acrosticHtml;
    document.getElementById('romanticQuote').innerHTML = `<i>"${randomQuote}"</i>`;

    // Canvas File Builder 
    async function generateCardFile() {
      const targetCard = document.getElementById('captureTarget');
      const canvas = await html2canvas(targetCard, { useCORS: true, scale: 2, backgroundColor: '#fff5f6' });
      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          resolve(new File([blob], `Amor_e_Card_${loverName}.png`, { type: 'image/png' }));
        }, 'image/png');
      });
    }

    // Fully unlocked Share Action
    document.getElementById('shareBtn').addEventListener('click', async function() {
      if (!navigator.share) {
        alert("Sharing isn't fully supported on this browser. Use 'Save HD Image File' button!");
        return;
      }
      try {
        const file = await generateCardFile();
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Amor-e Card' });
        }
      } catch (err) { console.log(err); }
    });

    // Unlocked Download Action
    document.getElementById('downloadBtn').addEventListener('click', function() {
      html2canvas(document.getElementById('captureTarget'), { useCORS: true, scale: 2, backgroundColor: '#fff5f6' }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Amor_e_Card_${loverName}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    });
  </script>
</body>
</html>
