<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <title>Romantic E-Card Creator</title>
  <style>
    body {
      font-family: 'Playfair Display', serif;
      background-color: #fcf8f8;
    }
    
    /* E-Card Container Style */
    .e-card-preview {
      background-color: #fff5f6; 
      border-radius: 20px;
      border: 1px solid #ffe3e7;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(228, 130, 146, 0.15);
      margin-top: 30px;
      width: 100%;
      max-width: 600px;
      position: relative; 
      overflow: hidden; 
      z-index: 1; 
    }

    /* Core Corner Graphics */
    .corner-floral {
      position: absolute;
      width: 100px; 
      height: 100px;
      background-size: contain;
      background-repeat: no-repeat;
      z-index: -1; 
      opacity: 0.8; 
    }

    .floral-top-left {
      top: 0;
      left: 0;
      background-image: url('flower.png');
    }

    .floral-bottom-right {
      bottom: 8rem;
      right: 0;
      background-image: url('flower.png');
      transform: rotate(180deg); 
    }

    .floral-bottom-left {
      bottom: 8rem;
      left: 0;
      background-image: url('heart.png');
      transform: rotate(45deg);
    }

    .floral-top-right {
      top: 0;
      right: 0;
      background-image: url('heart.png');
      transform: rotate(225deg); 
    }

    /* Transparent Scattered Pattern Overlay across the whole card canvas */
    .card-background-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('heart.png'); 
      background-size: 80px 80px; 
      background-repeat: repeat;   
      opacity: 0.05;               
      z-index: 0;                  
      pointer-events: none;
    }
    
    /* Content Styles */
    .card-content-wrapper {
      position: relative;
      z-index: 2; 
    }

    .card-text-main {
      font-size: 1.35rem;
      color: #4a3b32;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .acrostic-container {
      font-family: 'Dancing Script', cursive;
      font-size: 2.5rem;
      color: #c72c48;
      line-height: 1.3;
      margin: 25px 0;
    }
    
    .acrostic-letter {
      font-size: 3rem;
      font-weight: 700;
      color: #900c22;
    }

    .romantic-quote {
      font-size: 1.25rem;
      color: #615045;
      margin-top: 25px;
      border-top: 1px solid #ffd0d6;
      padding-top: 20px;
    }
    
    .main-heading {
      color: #900c22;
      font-weight: 700;
    }
  </style>

  <!-- External rendering toolkit -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 text-center">
        <h1 class="main-heading mb-3">Create a Greeting Card</h1>
        <p class="text-muted mb-4">Enter their name to generate a custom card image layout.</p>

        <form id="eCardForm" class="p-4 bg-white rounded shadow-sm border">
          <div class="mb-3">
            <label for="loverName" class="form-label fw-bold">Their Name:</label>
            <input type="text" class="form-control form-control-lg text-center" id="loverName" placeholder="e.g., Kiran" required>
          </div>
          <button type="submit" class="btn btn-danger btn-lg px-5">Generate Greeting Card</button>
        </form>

        <!-- Output Display Area -->
        <div id="eCardResult" class="mt-5 d-none">
          <h4 class="text-muted mb-3">Preview:</h4>
          
          <div class="d-flex justify-content-center">
            <!-- This target element is entirely screenshotted as a PNG file -->
            <div id="captureTarget" class="e-card-preview text-center">
              
              <!-- Graphics Base Layers -->
              <div class="corner-floral floral-top-left"></div>
              <div class="corner-floral floral-bottom-right"></div>
              <div class="corner-floral floral-bottom-left"></div>
              <div class="corner-floral floral-top-right"></div>
              <div class="card-background-pattern"></div>
              
              <!-- Content Text Layer -->
              <div class="card-content-wrapper">
                <div class="card-text-main">
                  To my wonderful <span id="partnerNameSpan" class="fw-bold"></span>. You are truly
                </div>
                
                <div id="acrosticMessage" class="acrostic-container"></div>
                
                <div id="romanticQuote" class="romantic-quote"></div>
              </div>

            </div>
          </div>

          <!-- Sharing Utilities -->
          <div class="mt-4 d-flex flex-wrap justify-content-center gap-3">
            <button id="shareBtn" class="btn btn-danger btn-lg px-4">
              💝 Share Whole Image Card
            </button>
            <button id="downloadBtn" class="btn btn-outline-secondary btn-lg px-4">
              💾 Save Image File
            </button>
          </div>
          <p class="text-muted small mt-2">💡 Note: Click Share to send the complete image directly to WhatsApp, Instagram Stories, or Email.</p>
        </div>

      </div>
    </div>
  </div>

  <script>
    const acrosticData = {
      'A': 'Adorable', 'B': 'Beautiful', 'C': 'Charming', 'D': 'Darling', 'E': 'Enchanting',
      'F': 'Fantastic', 'G': 'Gorgeous', 'H': 'Heavenly', 'I': 'Incredible', 'J': 'Joyful',
      'K': 'Kindhearted', 'L': 'Lovely', 'M': 'Magnetic', 'N': 'Nice', 'O': 'Outstanding',
      'P': 'Perfect', 'Q': 'Queen', 'R': 'Radiant', 'S': 'Special', 'T': 'Trustworthy',
      'U': 'Unique', 'V': 'Vibrant', 'W': 'Wonderful', 'X': 'Xtraordinary', 'Y': 'Youthful', 'Z': 'Zealous'
    };

    const romanticQuotes = [
      "You are the one I fell in love with, and the one I would fall for again and again.",
      "You make my world complete, and I am incredibly lucky to have you in my life.",
      "My love for you is a beautiful journey that starts at forever and ends at never.",
      "You make every single day feel like a fairytale. I love you more than words can say.",
      "Being in your arms is my absolute favorite place to be. You are my everything."
    ];

    document.getElementById('eCardForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const loverNameRaw = document.getElementById('loverName').value.trim();
      const loverName = loverNameRaw.charAt(0).toUpperCase() + loverNameRaw.slice(1);

      if (!loverName) return;

      let acrosticHtml = '';
      const upperName = loverName.toUpperCase();

      for (let i = 0; i < upperName.length; i++) {
        const letter = upperName[i];
        if (acrosticData[letter]) {
          const word = acrosticData[letter];
          acrosticHtml += `<div><span class="acrostic-letter">${letter}</span>${word.slice(1).toLowerCase()}</div>`;
        }
      }

      const randomQuote = romanticQuotes[Math.floor(Math.random() * romanticQuotes.length)];

      document.getElementById('eCardResult').classList.remove('d-none');
      document.getElementById('partnerNameSpan').innerText = loverName;
      document.getElementById('acrosticMessage').innerHTML = acrosticHtml;
      document.getElementById('romanticQuote').innerHTML = `<i>"${randomQuote}"</i>`;
      
      document.getElementById('eCardResult').scrollIntoView({ behavior: 'smooth' });
    });

    // Renders the entire card element container explicitly into a binary file blob
    async function generateCardFile() {
      const targetCard = document.getElementById('captureTarget');
      const loverName = document.getElementById('partnerNameSpan').innerText || 'GreetingCard';
      
      const canvas = await html2canvas(targetCard, {
        useCORS: true,
        scale: 2, 
        backgroundColor: '#fff5f6'
      });
      
      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          const file = new File([blob], `Love_Card_${loverName}.png`, { type: 'image/png' });
          resolve(file);
        }, 'image/png');
      });
    }

    // Direct Image-Object Web Share Router
    document.getElementById('shareBtn').addEventListener('click', async function() {
      if (!navigator.canShare) {
        alert("Your current browser version does not support native file sharing. Please use 'Save Image File' instead!");
        return;
      }

      try {
        const fullCardImageFile = await generateCardFile();
        
        if (navigator.canShare({ files: [fullCardImageFile] })) {
          await navigator.share({
            files: [fullCardImageFile],
            title: 'My Custom Love Greeting Card',
            text: 'I made a custom e-card for you!'
          });
        } else {
          alert("Sharing image files directly is restricted by your device settings.");
        }
      } catch (error) {
        console.log('Action canceled or unavailable:', error);
      }
    });

    // Fallback Download Trigger
    document.getElementById('downloadBtn').addEventListener('click', async function() {
      const loverName = document.getElementById('partnerNameSpan').innerText || 'GreetingCard';
      const targetCard = document.getElementById('captureTarget');
      
      html2canvas(targetCard, { useCORS: true, scale: 2, backgroundColor: '#fff5f6' }).then(canvas => {
        const imageUri = canvas.toDataURL("image/png");
        const downloadLink = document.createElement('a');
        downloadLink.download = `Love_Greeting_Card_${loverName}.png`;
        downloadLink.href = imageUri;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
      });
    });
  </script>
</body>
</html>
